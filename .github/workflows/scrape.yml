name: Scrape Port Data

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours (00:00, 04:00, 08:00, etc.)
  workflow_dispatch:         # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scrapers
        run: |
          python scrapers/directemar_scraper.py
          python scrapers/san_antonio_scraper.py
          python scrapers/valparaiso_scraper.py
          python scrapers/vesselfinder_scraper.py
        continue-on-error: true
      
      - name: Commit new data
        run: |
          git config --local user.email "bot@wazecargo.com"
          git config --local user.name "WazeCargo Bot"
          git add data/
          git commit -m "🤖 Scrape $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
